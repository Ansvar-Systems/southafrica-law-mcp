      summary: "SAFLII provides free, unrestricted access to South African legal information; legislation and case law are public domain"
    coverage:
      scope: "All national Acts of Parliament including Protection of Personal Information Act (POPIA, Act 4 of 2013), Electronic Communications and Transactions Act (ECTA, Act 25 of 2002), Cybercrimes Act (Act 19 of 2020), Companies Act (Act 71 of 2008), Consumer Protection Act (Act 68 of 2008), Promotion of Access to Information Act (PAIA, Act 2 of 2000), Regulation of Interception of Communications Act (RICA, Act 70 of 2002); regulations; Constitutional Court decisions; Supreme Court of Appeal decisions; High Court decisions"
      limitations: "Historical legislation before 1994 may be incomplete; some provincial legislation not covered; Gazette Statutory Instruments may lag; bulk download requires permission from SAFLII"
    languages:
